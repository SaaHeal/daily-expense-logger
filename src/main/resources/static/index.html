<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExpenseLogger | Modern Finance Tracking</title>
    <link rel="stylesheet" href="index.css">
    <!-- React and Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const API_BASE = "/api/expenses";

        const CATEGORY_MAP = {
            'Food': { icon: 'utensils', color: '#fb7185' },
            'Petrol': { icon: 'fuel', color: '#fbbf24' },
            'Rent': { icon: 'home', color: '#60a5fa' },
            'Shopping': { icon: 'shopping-bag', color: '#c084fc' },
            'Other': { icon: 'layers', color: '#94a3b8' }
        };

        function App() {
            const [expenses, setExpenses] = useState([]);
            const [summary, setSummary] = useState({ today: 0, week: 0, month: 0, year: 0 });
            const [loading, setLoading] = useState(true);
            const [submitting, setSubmitting] = useState(false);
            const [error, setError] = useState(null);
            const [formData, setFormData] = useState({ amount: "", category: "Food", description: "" });

            useEffect(() => {
                fetchData();
            }, []);

            useEffect(() => {
                const interval = setInterval(() => {
                    lucide.createIcons();
                }, 100);
                return () => clearInterval(interval);
            }, [expenses, loading]);

            const fetchData = async () => {
                try {
                    const [expensesRes, summaryRes] = await Promise.all([
                        fetch(API_BASE),
                        fetch(`${API_BASE}/summary`)
                    ]);

                    if (!expensesRes.ok || !summaryRes.ok) {
                        throw new Error("Server returned an error");
                    }

                    const expensesData = await expensesRes.json();
                    const summaryData = await summaryRes.json();

                    setExpenses(Array.isArray(expensesData) ? expensesData.reverse() : []);
                    setSummary(summaryData || { today: 0, week: 0, month: 0, year: 0 });
                    setError(null);
                } catch (error) {
                    console.error("Error fetching data:", error);
                    setError("Unable to connect to financial ledger. Please check if the server is running.");
                } finally {
                    setLoading(false);
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!formData.amount || submitting) return;

                setSubmitting(true);
                setError(null);

                try {
                    const response = await fetch(API_BASE, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            amount: parseFloat(formData.amount),
                            category: formData.category,
                            description: formData.description
                        })
                    });

                    if (response.ok) {
                        setFormData({ amount: "", category: "Food", description: "" });
                        await fetchData();
                    } else {
                        const errData = await response.json().catch(() => ({}));
                        setError(errData.message || "Failed to record transaction. Please try again.");
                    }
                } catch (error) {
                    console.error("Error adding expense:", error);
                    setError("Network error: Could not reach the server.");
                } finally {
                    setSubmitting(false);
                }
            };

            return (
                <div className="container">
                    <header>
                        <h1>ExpenseLogger</h1>
                        <p className="subtitle">Track your wealth with precision and style</p>
                    </header>

                    {error && (
                        <div style={{
                            background: 'rgba(251, 113, 133, 0.1)',
                            border: '1px solid var(--danger)',
                            padding: '1rem 2rem',
                            borderRadius: '16px',
                            marginBottom: '2rem',
                            display: 'flex',
                            alignItems: 'center',
                            gap: '1rem',
                            animation: 'fadeInDown 0.4s ease-out'
                        }}>
                            <i data-lucide="alert-circle" style={{ color: 'var(--danger)' }}></i>
                            <span style={{ color: 'var(--danger)', fontWeight: 600 }}>{error}</span>
                        </div>
                    )}

                    <div className="summary-grid">
                        <SummaryCard label="Today" value={summary.today} glow />
                        <SummaryCard label="This Week" value={summary.week} />
                        <SummaryCard label="This Month" value={summary.month} />
                        <SummaryCard label="This Year" value={summary.year} />
                    </div>

                    <div className="form-section glass-card">
                        <form onSubmit={handleSubmit} className="form-grid">
                            <div className="form-group">
                                <label>AMOUNT (₹)</label>
                                <input
                                    className="form-input"
                                    type="number"
                                    step="0.01"
                                    placeholder="Enter amount..."
                                    value={formData.amount}
                                    onChange={e => setFormData({ ...formData, amount: e.target.value })}
                                    required
                                />
                            </div>
                            <div className="form-group">
                                <label>CATEGORY</label>
                                <select
                                    className="form-input"
                                    value={formData.category}
                                    onChange={e => setFormData({ ...formData, category: e.target.value })}
                                >
                                    {Object.keys(CATEGORY_MAP).map(cat => (
                                        <option key={cat} value={cat}>{cat}</option>
                                    ))}
                                </select>
                            </div>
                            <div className="form-group">
                                <label>DESCRIPTION</label>
                                <input
                                    className="form-input"
                                    type="text"
                                    placeholder="What was it for?"
                                    value={formData.description}
                                    onChange={e => setFormData({ ...formData, description: e.target.value })}
                                />
                            </div>
                            <button
                                type="submit"
                                className="btn-primary"
                                disabled={submitting}
                                style={{ opacity: submitting ? 0.7 : 1, cursor: submitting ? 'not-allowed' : 'pointer' }}
                            >
                                {submitting ? 'Recording...' : 'Add Transaction'}
                            </button>
                        </form>
                    </div>

                    <div className="list-section glass-card">
                        <div className="list-header">
                            <h2>Recent Activity</h2>
                            <span style={{ color: '#94a3b8', fontSize: '0.85rem' }}>{expenses.length} Total</span>
                        </div>
                        <ul className="transaction-list">
                            {loading ? (
                                <div style={{ padding: '4rem', textAlign: 'center', color: '#94a3b8' }}>
                                    <p>Gathering your finances...</p>
                                </div>
                            ) : expenses.length === 0 ? (
                                <div style={{ padding: '4rem', textAlign: 'center', color: '#94a3b8' }}>
                                    <i data-lucide="info" style={{ width: 32, height: 32, marginBottom: '1rem', opacity: 0.5 }}></i>
                                    <p>Your ledger is currently empty</p>
                                </div>
                            ) : (
                                expenses.slice(0, 10).map(exp => (
                                    <li key={exp.id} className="transaction-item">
                                        <div className="cat-icon" style={{ border: `1px solid ${CATEGORY_MAP[exp.category]?.color}44` }}>
                                            <i data-lucide={CATEGORY_MAP[exp.category]?.icon} style={{ color: CATEGORY_MAP[exp.category]?.color }}></i>
                                        </div>
                                        <div className="trans-info">
                                            <div className="title">{exp.description || 'No description'}</div>
                                            <div className="category">{exp.category}</div>
                                        </div>
                                        <div className="trans-amount">₹{(exp.amount || 0).toLocaleString('en-IN', { minimumFractionDigits: 2 })}</div>
                                        <div className="trans-date">
                                            {exp.date ? new Date(exp.date).toLocaleDateString('en-IN', { day: '2-digit', month: 'short' }) : 'Today'}
                                        </div>
                                    </li>
                                ))
                            )}
                        </ul>
                    </div>
                </div>
            );
        }

        function SummaryCard({ label, value, glow }) {
            return (
                <div className="summary-card glass-card">
                    <div className="summary-label">{label}</div>
                    <div className="summary-value">
                        <span className="currency-symbol">₹</span>
                        {(value || 0).toLocaleString('en-IN', { minimumFractionDigits: 2 })}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
